<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — VisionaryCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/styles/main.css">
  <style>
    body {
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: .25rem;
    }

    .auth-sub {
      color: var(--text-muted);
      font-size: .9rem;
      margin-bottom: 1.5rem;
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .role-btn {
      padding: 1.25rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      background: var(--surface);
      text-align: center;
      transition: border-color.2s, background.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }

    .role-btn.icon {
      font-size: 2rem;
    }

    .role-btn strong {
      font-size: .95rem;
    }

    .role-btn small {
      font-size: .8rem;
      color: var(--text-muted);
    }

    .role-btn[aria-pressed="true"] {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .role-btn[aria-pressed="true"] strong {
      color: var(--primary);
    }

    .lang-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .lang-chip {
      padding: .35rem .9rem;
      border: 2px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      background: var(--surface);
      transition: all.2s;
    }

    .lang-chip.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    #mentor-fields {
      display: none;
    }

    #student-fields {
      display: none;
    }
  </style>
</head>

<body>
  <a href="#main" class="skip-link">Saltar al formulario de registro</a>
  <div id="aria-live" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <header class="navbar" role="banner">
    <div class="container nav-container">
      <a href="../index.html" class="logo"><img src="../assets/images/minilogo.jpg" alt="VisionaryCode" class="logo-img"> VisionaryCode</a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost btn-sm">Ya tengo cuenta</a>
      </div>
    </div>
  </header>

  <main id="main" class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-sub">Únete a VisionaryCode y aprende a programar sin límites.</p>

      <!-- Selector de rol -->
      <fieldset style="border:none;padding:0;margin:0 0 1.5rem">
        <legend style="font-weight:700;font-size:.9rem;margin-bottom:.75rem">¿Cuál es tu rol?</legend>
        <div class="role-selector" role="group" aria-label="Selecciona tu rol">
          <button type="button" class="role-btn" id="role-student" aria-pressed="false" onclick="selectRole('student')" aria-describedby="role-student-desc">
            <span class="icon" aria-hidden="true">👨‍💻</span>
            <strong>Estudiante</strong>
            <small id="role-student-desc">Aprendo a programar</small>
          </button>
          <button type="button" class="role-btn" id="role-mentor" aria-pressed="false" onclick="selectRole('mentor')" aria-describedby="role-mentor-desc">
            <span class="icon" aria-hidden="true">🧑‍🏫</span>
            <strong>Mentor</strong>
            <small id="role-mentor-desc">Enseño programación</small>
          </button>
        </div>
      </fieldset>

      <form id="register-form" novalidate aria-label="Formulario de registro">
        <div class="form-group">
          <label for="name">Nombre completo</label>
          <input type="text" id="name" autocomplete="name" placeholder="Tu nombre" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" autocomplete="email" placeholder="tu@correo.com" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required aria-required="true" minlength="6">
        </div>

        <!-- Campos específicos de estudiante -->
        <div id="student-fields" aria-label="Información de estudiante">
          <div class="form-group">
            <label for="level">Nivel de programación</label>
            <select id="level" aria-required="true">
              <option value="">Selecciona tu nivel</option>
              <option value="beginner">Principiante</option>
              <option value="intermediate">Intermedio</option>
              <option value="advanced">Avanzado</option>
            </select>
          </div>
        </div>

        <!-- Campos específicos de mentor -->
        <div id="mentor-fields" aria-label="Información de mentor">
          <div class="form-group">
            <label>Lenguajes que dominas</label>
            <p class="hint" id="lang-hint">Selecciona al menos uno para recibir solicitudes.</p>
            <div class="lang-grid" role="group" aria-labelledby="lang-hint">
              <button type="button" class="lang-chip" data-lang="Python" onclick="toggleLang(this)" aria-pressed="false">Python</button>
              <button type="button" class="lang-chip" data-lang="JavaScript" onclick="toggleLang(this)" aria-pressed="false">JavaScript</button>
              <button type="button" class="lang-chip" data-lang="TypeScript" onclick="toggleLang(this)" aria-pressed="false">TypeScript</button>
              <button type="button" class="lang-chip" data-lang="React" onclick="toggleLang(this)" aria-pressed="false">React</button>
              <button type="button" class="lang-chip" data-lang="Node.js" onclick="toggleLang(this)" aria-pressed="false">Node.js</button>
              <button type="button" class="lang-chip" data-lang="SQL" onclick="toggleLang(this)" aria-pressed="false">SQL</button>
            </div>
          </div>
          <div class="form-group">
            <label for="bio">Breve presentación</label>
            <textarea id="bio" rows="3" placeholder="Cuéntanos tu experiencia como desarrollador..."></textarea>
          </div>
        </div>

        <div id="reg-error" class="alert alert-error" role="alert" style="display:none;margin-bottom:1rem"></div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%" disabled>
          <i class="fa-solid fa-user-plus" aria-hidden="true"></i>
          Crear cuenta
        </button>
      </form>

      <p style="text-align:center;margin-top:1.25rem;font-size:.9rem;color:var(--text-muted)">
        ¿Ya tienes cuenta? <a href="login.html" style="color:var(--primary);font-weight:600">Inicia sesión</a>
      </p>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner"><span>© 2026 VisionaryCode</span></div>
  </footer>

  <script src="../assets/scripts/app.js"></script>
  <script>
    let selectedRole = null;
    const selectedLangs = new Set();

    // Pre-select from URL param
    const params = new URLSearchParams(location.search);
    if (params.get('role')) setTimeout(() => selectRole(params.get('role')), 100);

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-student').setAttribute('aria-pressed', role === 'student');
      document.getElementById('role-mentor').setAttribute('aria-pressed', role === 'mentor');
      document.getElementById('student-fields').style.display = role === 'student' ? 'block' : 'none';
      document.getElementById('mentor-fields').style.display = role === 'mentor' ? 'block' : 'none';
      document.getElementById('submit-btn').disabled = false;
      TTS.speak('Rol seleccionado: ' + (role === 'student' ? 'Estudiante' : 'Mentor'));
    }

    function toggleLang(btn) {
      const lang = btn.dataset.lang;
      if (selectedLangs.has(lang)) {
        selectedLangs.delete(lang);
        btn.classList.remove('selected');
        btn.setAttribute('aria-pressed', 'false');
      } else {
        selectedLangs.add(lang);
        btn.classList.add('selected');
        btn.setAttribute('aria-pressed', 'true');
      }
      TTS.speak(lang + (selectedLangs.has(lang) ? ' seleccionado' : ' deseleccionado'));
    }

    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const errBox = document.getElementById('reg-error');
      errBox.style.display = 'none';

      if (!selectedRole) {
        errBox.style.display = 'flex';
        errBox.textContent = 'Selecciona un rol.';
        TTS.speak('Error: selecciona un rol.');
        return;
      }
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!name || !email || !password) {
        errBox.style.display = 'flex';
        errBox.textContent = 'Completa todos los campos obligatorios.';
        TTS.speak('Error: completa todos los campos.');
        return;
      }
      if (password.length < 6) {
        errBox.style.display = 'flex';
        errBox.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        TTS.speak('Error: contraseña muy corta.');
        return;
      }
      if (selectedRole === 'mentor' && selectedLangs.size === 0) {
        errBox.style.display = 'flex';
        errBox.textContent = 'Selecciona al menos un lenguaje de especialidad.';
        TTS.speak('Error: selecciona al menos un lenguaje.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const data = {
        name,
        email,
        password,
        role: selectedRole
      };
      if (selectedRole === 'mentor') {
        data.langs = [...selectedLangs];
        data.bio = document.getElementById('bio').value.trim();
      }
      if (selectedRole === 'student') {
        data.level = document.getElementById('level').value;
      }

      setTimeout(() => {
        const user = Auth.register(data);
        // anuncio de bienvenida
        TTS.speak('Cuenta creada exitosamente. Bienvenido a VisionaryCode, ' + user.name, true);
        TTS.playEarcon('success');
        toast('¡Bienvenido a VisionaryCode! 🎉', 'success', 4000);
        setTimeout(() => {
          if (user.role === 'student') window.location.href = '../student/dashboard.html';
          else window.location.href = '../mentor/dashboard.html';
        }, 1500);
      }, 700);
    });
  </script>
</body>

</html>
